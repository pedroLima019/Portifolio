<!DOCTYPE html>
<html lang="pt-BR">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

    <link
      rel="shortcut icon"
      href="/assets/img/favicon 1.png"
      type="image/x-icon"
    />

    <!-- ICON -->
    <link
      rel="stylesheet"
      href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:opsz,wght,FILL,GRAD@20..48,100..700,0..1,-50..200"
    />

    <!-- CSS -->
    <link rel="stylesheet" href="assets/css/global.css" />
    <link rel="stylesheet" href="assets/css/responsive.css" />

    <!-- JS -->
    <script src="js/Script.js" defer></script>

    <title>Portifólio/Pedro Lima</title>
  </head>
  <body>
    <header class="header-container">
      <nav class="nav-content" id="nav-content">
        <div class="logo">
          <img src="assets/img/logo.png" alt="logo Pedro Lima" />
        </div>
        <div class="hamburger" id="hamburger">
          <span class="material-symbols-outlined"> menu </span>
        </div>
        <ul class="links-container" id="links-container">
          <li><a href="#home">Home</a></li>
          <li><a href="#sobre">Sobre</a></li>
          <li><a href="#skills">Skills</a></li>
          <li><a href="#servicos">Serviços</a></li>
        </ul>
        <div class="social-media">
          <img src="assets/img/el_linkedin.png" alt="linkedin" />
          <img src="assets/img/github.png" alt="github" />
          <img src="assets/img/mdi_gmail.png" alt="gmail" />
        </div>
      </nav>
    </header>
    <main class="main-container">
      <section class="home-container">
        <div class="home-content">
          <div class="text-content">
            <h3>
              Transformando ideias em <strong>produtos digitais</strong> de alta performance e
              qualidade.
            </h3>
            <p>
              Transformando ideias em soluções digitais inovadoras e eficientes
              para impulsionar o sucesso do seu negócio
            </p>
            
            <div class="btn-service">
            <a href="http://" target="_blank" rel="noopener noreferrer"
              >Solicitar serviço</a
            >
           </div>
          </div>
          <div class="img-content">
            <img src="assets/img/logoGrande.png" alt="" />
          </div>
        </div>
      </section>
    </main> 
  </body>
</html>
